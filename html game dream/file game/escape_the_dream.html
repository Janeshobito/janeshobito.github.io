<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESCAPE THE DREAM</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

  :root {
    --cyan: #00f5ff;
    --magenta: #ff00aa;
    --blue: #0066ff;
    --dark: #020408;
    --darker: #010204;
    --panel: rgba(0,20,40,0.85);
    --glitch: #ff0055;
    --echo: #44aaff;
    --text: #b0d4e8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px;
    line-height: 1.7;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
    animation: gridScroll 20s linear infinite;
  }

  @keyframes gridScroll {
    0% { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  #game-container {
    position: relative;
    z-index: 10;
    max-width: 860px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---- HEADER ---- */
  #header {
    text-align: center;
    padding: 30px 0 20px;
    position: relative;
  }

  #title {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(28px, 6vw, 52px);
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--cyan);
    text-shadow:
      0 0 20px var(--cyan),
      0 0 40px var(--cyan),
      0 0 80px rgba(0,245,255,0.4);
    animation: titlePulse 3s ease-in-out infinite;
    position: relative;
  }

  #title::before {
    content: 'ESCAPE THE DREAM';
    position: absolute;
    inset: 0;
    color: var(--glitch);
    text-shadow: none;
    clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
    animation: titleGlitch 5s infinite;
    opacity: 0;
  }

  @keyframes titleGlitch {
    0%, 92%, 100% { opacity: 0; transform: none; }
    93% { opacity: 0.7; transform: translateX(-4px); }
    94% { opacity: 0; }
    95% { opacity: 0.5; transform: translateX(4px); }
    96% { opacity: 0; }
  }

  @keyframes titlePulse {
    0%, 100% { text-shadow: 0 0 20px var(--cyan), 0 0 40px var(--cyan); }
    50% { text-shadow: 0 0 30px var(--cyan), 0 0 60px var(--cyan), 0 0 100px rgba(0,245,255,0.5); }
  }

  #subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--magenta);
    margin-top: 6px;
    opacity: 0.8;
  }

  /* ---- STATUS BAR ---- */
  #status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    border: 1px solid rgba(0,245,255,0.2);
    border-radius: 4px;
    background: rgba(0,10,20,0.7);
    margin-bottom: 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }

  #status-bar .stat {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .stat-label { color: rgba(176,212,232,0.5); }
  .stat-val { color: var(--cyan); font-weight: bold; }

  #stability-bar-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #stability-track {
    width: 100px;
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    overflow: hidden;
  }

  #stability-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--blue));
    border-radius: 4px;
    transition: width 0.5s ease;
    box-shadow: 0 0 8px var(--cyan);
  }

  /* ---- PASSAGE ---- */
  #passage-wrap {
    flex: 1;
    border: 1px solid rgba(0,245,255,0.15);
    border-radius: 6px;
    background: var(--panel);
    padding: 30px 36px;
    position: relative;
    overflow: hidden;
    margin-bottom: 16px;
    backdrop-filter: blur(4px);
  }

  #passage-wrap::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), var(--magenta), transparent);
    animation: topBorder 3s linear infinite;
  }

  @keyframes topBorder {
    0% { opacity: 0.4; }
    50% { opacity: 1; }
    100% { opacity: 0.4; }
  }

  #location-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--magenta);
    margin-bottom: 20px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #location-tag::before {
    content: '▶';
    color: var(--cyan);
    font-size: 8px;
  }

  #passage-text {
    font-size: 17px;
    line-height: 1.85;
    color: #c8dde8;
  }

  #passage-text p { margin-bottom: 14px; }

  /* Speaker lines */
  .line-elara {
    color: #ffe066;
    font-style: italic;
    padding-left: 12px;
    border-left: 2px solid #ffe066;
    margin: 10px 0;
  }

  .line-echo {
    color: var(--echo);
    font-style: italic;
    padding-left: 12px;
    border-left: 2px solid var(--echo);
    margin: 10px 0;
  }

  .line-nexus {
    color: #ff4444;
    font-style: italic;
    padding-left: 12px;
    border-left: 2px solid #ff4444;
    margin: 10px 0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 1px;
  }

  .speaker {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    opacity: 0.7;
    display: block;
    margin-bottom: 2px;
  }

  .env-text {
    color: rgba(176,212,232,0.6);
    font-size: 15px;
    font-style: italic;
  }

  .highlight { color: var(--cyan); font-weight: 600; }
  .warning { color: var(--glitch); font-weight: 600; }
  .memory { color: #aa88ff; }

  /* ---- GLITCH EFFECT ---- */
  .glitch-text {
    position: relative;
    display: inline-block;
    animation: glitch 4s infinite;
  }

  @keyframes glitch {
    0%, 90%, 100% { transform: none; filter: none; }
    91% { transform: translate(-2px, 1px); filter: blur(0.5px); color: var(--glitch); }
    92% { transform: translate(2px, -1px); }
    93% { transform: none; color: inherit; }
  }

  /* ---- INVENTORY ---- */
  #inventory-wrap {
    border: 1px solid rgba(0,245,255,0.15);
    border-radius: 6px;
    background: rgba(0,8,16,0.7);
    padding: 12px 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    min-height: 46px;
  }

  .inv-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(176,212,232,0.4);
    text-transform: uppercase;
  }

  .inv-item {
    background: rgba(0,245,255,0.08);
    border: 1px solid rgba(0,245,255,0.3);
    border-radius: 3px;
    padding: 3px 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--cyan);
    animation: itemGlow 2s ease-in-out infinite;
  }

  @keyframes itemGlow {
    0%, 100% { box-shadow: 0 0 4px rgba(0,245,255,0.2); }
    50% { box-shadow: 0 0 10px rgba(0,245,255,0.5); }
  }

  /* ---- CHOICES ---- */
  #choices {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .choice-btn {
    background: transparent;
    border: 1px solid rgba(0,245,255,0.3);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 600;
    padding: 14px 24px;
    cursor: pointer;
    text-align: left;
    position: relative;
    overflow: hidden;
    transition: all 0.2s ease;
    letter-spacing: 0.5px;
  }

  .choice-btn::before {
    content: '›';
    color: var(--cyan);
    margin-right: 12px;
    font-size: 20px;
    line-height: 1;
    vertical-align: middle;
    transition: transform 0.2s;
  }

  .choice-btn::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0;
    background: linear-gradient(90deg, rgba(0,245,255,0.08), transparent);
    transition: width 0.3s ease;
  }

  .choice-btn:hover {
    border-color: var(--cyan);
    color: #fff;
    transform: translateX(4px);
    box-shadow: 0 0 20px rgba(0,245,255,0.15), inset 0 0 20px rgba(0,245,255,0.05);
  }

  .choice-btn:hover::after { width: 100%; }
  .choice-btn:hover::before { transform: translateX(4px); }

  .choice-btn:active { transform: translateX(2px) scale(0.99); }

  .choice-btn.danger {
    border-color: rgba(255,0,85,0.3);
    color: rgba(255,100,100,0.9);
  }

  .choice-btn.danger:hover {
    border-color: var(--glitch);
    color: #fff;
    box-shadow: 0 0 20px rgba(255,0,85,0.2);
  }

  .choice-btn.echo-choice {
    border-color: rgba(68,170,255,0.3);
    color: rgba(100,180,255,0.9);
  }

  .choice-btn.echo-choice:hover {
    border-color: var(--echo);
    box-shadow: 0 0 20px rgba(68,170,255,0.2);
  }

  /* ---- PUZZLE UI ---- */
  #puzzle-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 500;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  #puzzle-overlay.active { display: flex; }

  #puzzle-box {
    border: 1px solid var(--cyan);
    border-radius: 8px;
    background: rgba(0,10,25,0.98);
    padding: 36px;
    max-width: 500px;
    width: 90%;
    box-shadow: 0 0 60px rgba(0,245,255,0.2);
    position: relative;
  }

  #puzzle-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
  }

  .puzzle-title {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--cyan);
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .puzzle-desc {
    font-size: 15px;
    color: var(--text);
    margin-bottom: 24px;
    line-height: 1.6;
  }

  /* Waveform puzzle */
  #waveform-puzzle .sliders {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 24px;
  }

  .wave-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .wave-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--magenta);
    width: 30px;
  }

  .wave-slider {
    flex: 1;
    -webkit-appearance: none;
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.1);
    outline: none;
    cursor: pointer;
  }

  .wave-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 10px var(--cyan);
    cursor: pointer;
    transition: transform 0.1s;
  }

  .wave-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }

  .wave-target {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    width: 30px;
    text-align: right;
  }

  /* Code lock puzzle */
  #codelock-puzzle .digit-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 24px;
  }

  .digit-box {
    width: 60px;
    height: 80px;
    border: 2px solid rgba(0,245,255,0.4);
    border-radius: 6px;
    background: rgba(0,20,40,0.8);
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  .digit-up, .digit-down {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--cyan);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    transition: background 0.15s;
    font-family: 'Orbitron', monospace;
  }

  .digit-up:hover, .digit-down:hover { background: rgba(0,245,255,0.1); }

  .digit-val {
    font-family: 'Orbitron', monospace;
    font-size: 26px;
    color: #fff;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-shadow: 0 0 10px var(--cyan);
  }

  /* Circuit puzzle */
  #circuit-puzzle .grid {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 6px;
    margin-bottom: 24px;
  }

  .pipe-tile {
    aspect-ratio: 1;
    border: 1px solid rgba(0,245,255,0.2);
    border-radius: 4px;
    background: rgba(0,15,30,0.9);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    transition: all 0.15s;
    position: relative;
    user-select: none;
  }

  .pipe-tile:hover { border-color: var(--cyan); background: rgba(0,40,60,0.9); }
  .pipe-tile.connected { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }
  .pipe-tile.glitch-node { color: var(--glitch); cursor: not-allowed; }
  .pipe-tile.active { background: rgba(0,245,255,0.1); border-color: var(--cyan); }

  /* Puzzle feedback */
  .puzzle-feedback {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 10px;
    border-radius: 4px;
    margin-bottom: 16px;
    display: none;
    text-align: center;
  }

  .puzzle-feedback.error {
    background: rgba(255,0,85,0.1);
    border: 1px solid rgba(255,0,85,0.3);
    color: var(--glitch);
    display: block;
  }

  .puzzle-feedback.success {
    background: rgba(0,245,255,0.1);
    border: 1px solid rgba(0,245,255,0.3);
    color: var(--cyan);
    display: block;
  }

  .puzzle-btn {
    background: transparent;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 12px 28px;
    cursor: pointer;
    border-radius: 4px;
    width: 100%;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .puzzle-btn:hover {
    background: rgba(0,245,255,0.1);
    box-shadow: 0 0 20px rgba(0,245,255,0.2);
  }

  /* ---- NOTIFICATION ---- */
  #notif {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 800;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }

  .notif-msg {
    background: rgba(0,10,25,0.95);
    border: 1px solid var(--cyan);
    border-radius: 4px;
    padding: 12px 18px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--cyan);
    box-shadow: 0 0 20px rgba(0,245,255,0.2);
    animation: notifIn 0.3s ease, notifOut 0.4s ease 2.6s forwards;
    max-width: 280px;
  }

  .notif-msg.echo-notif { border-color: var(--echo); color: var(--echo); }
  .notif-msg.warn-notif { border-color: var(--glitch); color: var(--glitch); }

  @keyframes notifIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform:none; } }
  @keyframes notifOut { to { opacity:0; transform: translateX(20px); } }

  /* ---- TRANSITION ---- */
  #transition-overlay {
    position: fixed;
    inset: 0;
    background: var(--dark);
    z-index: 900;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  #transition-overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ---- TITLE SCREEN ---- */
  #title-screen {
    position: fixed;
    inset: 0;
    background: var(--dark);
    z-index: 700;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
  }

  #title-screen .big-title {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(36px, 8vw, 80px);
    color: var(--cyan);
    text-shadow: 0 0 40px var(--cyan), 0 0 80px rgba(0,245,255,0.3);
    letter-spacing: 4px;
    margin-bottom: 8px;
    animation: titlePulse 3s ease-in-out infinite;
  }

  #title-screen .the-word {
    font-family: 'Orbitron', monospace;
    font-size: clamp(18px, 4vw, 36px);
    letter-spacing: 12px;
    color: rgba(0,245,255,0.5);
    margin-bottom: 4px;
  }

  #title-screen .tagline {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--magenta);
    margin: 20px 0 40px;
    opacity: 0.8;
  }

  #title-screen .credits {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: rgba(176,212,232,0.3);
    letter-spacing: 2px;
    margin-top: 30px;
  }

  .start-btn {
    background: transparent;
    border: 2px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    letter-spacing: 4px;
    padding: 16px 48px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.3s;
    text-transform: uppercase;
    box-shadow: 0 0 30px rgba(0,245,255,0.15), inset 0 0 30px rgba(0,245,255,0.05);
    animation: startPulse 2s ease-in-out infinite;
  }

  .start-btn:hover {
    background: rgba(0,245,255,0.12);
    box-shadow: 0 0 50px rgba(0,245,255,0.4), inset 0 0 30px rgba(0,245,255,0.1);
    transform: scale(1.04);
  }

  @keyframes startPulse {
    0%, 100% { box-shadow: 0 0 20px rgba(0,245,255,0.15), inset 0 0 20px rgba(0,245,255,0.05); }
    50% { box-shadow: 0 0 40px rgba(0,245,255,0.3), inset 0 0 30px rgba(0,245,255,0.08); }
  }

  /* passage animation */
  #passage-text.typing {
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: none; }
  }

  /* glitch flash */
  .glitch-flash {
    animation: glitchFlash 0.3s ease;
  }

  @keyframes glitchFlash {
    0% { filter: none; }
    25% { filter: hue-rotate(90deg) brightness(1.5); }
    50% { filter: invert(0.2); }
    75% { filter: hue-rotate(-90deg); }
    100% { filter: none; }
  }

  /* Stability colors */
  .stab-high { background: linear-gradient(90deg, var(--cyan), #00aa88) !important; }
  .stab-mid { background: linear-gradient(90deg, #ffaa00, #ff6600) !important; box-shadow: 0 0 8px #ff8800 !important; }
  .stab-low { background: linear-gradient(90deg, var(--glitch), #880000) !important; box-shadow: 0 0 8px var(--glitch) !important; }

  /* end screen */
  #end-screen {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }

  #end-screen.visible { display: block; }

  .end-title {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    letter-spacing: 4px;
    margin-bottom: 20px;
  }

  .restart-btn {
    background: transparent;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    padding: 12px 32px;
    cursor: pointer;
    border-radius: 4px;
    margin-top: 24px;
    transition: all 0.2s;
  }

  .restart-btn:hover { background: rgba(0,245,255,0.1); }

  @media (max-width: 600px) {
    #passage-wrap { padding: 20px; }
    .choice-btn { padding: 12px 16px; font-size: 15px; }
    #puzzle-box { padding: 20px; }
  }
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="title-screen">
  <div class="the-word">ESCAPE THE</div>
  <div class="big-title">DREAM</div>
  <div class="tagline">// DREAMLOCK DEMO · CHAPTER ONE //</div>
  <button class="start-btn" onclick="startGame()">INITIALIZE</button>
  <div class="credits">DESIGNED BY JANESHWARAN R &nbsp;·&nbsp; DEMO BUILD</div>
</div>

<!-- TRANSITION -->
<div id="transition-overlay"></div>

<!-- NOTIFICATION AREA -->
<div id="notif"></div>

<!-- PUZZLE OVERLAY -->

// ============================================================
//  PUZZLE FUNCTIONS
// ============================================================
let currentPuzzleKey = null;
let currentPuzzleNext = null;

function openPuzzle(key, nextPassage) {
  currentPuzzleKey = key;
  currentPuzzleNext = nextPassage;
  const pz = puzzles[key];
  const box = document.getElementById('puzzle-box');
  pz.render(box);
  document.getElementById('puzzle-overlay').classList.add('active');
}

function closePuzzle(success) {
  document.getElementById('puzzle-overlay').classList.remove('active');
  if (success && currentPuzzleNext) {
    goTo(currentPuzzleNext);
  }
}

function updateWaveSlider(idx, target) {
  const val = parseInt(document.getElementById('ws'+idx).value);
  const valEl = document.getElementById('wval'+idx);
  const barEl = document.getElementById('wbar'+idx);
  const trackEl = document.getElementById('wtrack'+idx);
  const rowEl = document.getElementById('wrow'+idx);
  if (!valEl) return;

  valEl.textContent = val;
  trackEl.style.width = val + '%';

  const diff = Math.abs(val - target);
  if (diff <= 4) {
    valEl.style.color = 'var(--cyan)';
    barEl.style.background = 'var(--cyan)';
    barEl.style.boxShadow = '0 0 12px var(--cyan)';
    trackEl.style.background = 'var(--cyan)';
    rowEl.style.borderColor = 'rgba(0,245,255,0.5)';
    rowEl.style.background = 'rgba(0,245,255,0.06)';
  } else if (diff <= 8) {
    valEl.style.color = '#ffdd00';
    barEl.style.background = '#ffdd00';
    barEl.style.boxShadow = '0 0 8px #ffdd00';
    trackEl.style.background = '#ffdd00';
    rowEl.style.borderColor = 'rgba(255,220,0,0.3)';
    rowEl.style.background = 'rgba(0,10,25,0.6)';
  } else if (diff <= 18) {
    valEl.style.color = '#ff8800';
    barEl.style.background = '#ff8800';
    barEl.style.boxShadow = '0 0 8px #ff8800';
    trackEl.style.background = '#ff8800';
    rowEl.style.borderColor = 'rgba(255,136,0,0.25)';
    rowEl.style.background = 'rgba(0,10,25,0.6)';
  } else {
    valEl.style.color = 'var(--glitch)';
    barEl.style.background = 'var(--glitch)';
    barEl.style.boxShadow = '0 0 8px var(--glitch)';
    trackEl.style.background = 'var(--glitch)';
    rowEl.style.borderColor = 'rgba(255,0,85,0.2)';
    rowEl.style.background = 'rgba(0,10,25,0.6)';
  }
}

function checkWaveform() {
  const pz = puzzles.waveform;
  if (pz.check()) {
    showPF('success', '✓ ALL CHANNELS STABILIZED — SYSTEM ONLINE');
    setTimeout(() => closePuzzle(true), 1000);
  } else {
    const vals = [0,1,2].map(i => parseInt(document.getElementById('ws'+i).value));
    const bad = pz.targets.map((t,i) => Math.abs(vals[i]-t) > 4 ? 'CH '+(i+1) : null).filter(Boolean);
    showPF('error', '✗ OUT OF SYNC: ' + bad.join(', ') + ' — keep adjusting');
  }
}

function checkCodelock() {
  const pz = puzzles.codelock;
  if (pz.check()) {
    showPF('success', '✓ COMBINATION ACCEPTED — CHEST UNLOCKED');
    setTimeout(() => closePuzzle(true), 1000);
  } else {
    // tell player which digits are wrong
    const hints = pz.answer.map((a,i) => {
      const d = pz.digits[i];
      if (d === a) return `Digit ${i+1}: ✓`;
      return `Digit ${i+1}: ${d < a ? '▲ too low' : '▼ too high'}`;
    });
    showPF('error', '✗ WRONG CODE  —  ' + hints.join('  |  '));
  }
}

function digitChange(idx, dir) {
  const pz = puzzles.codelock;
  pz.digits[idx] = (pz.digits[idx] + dir + 10) % 10;
  document.getElementById('dv'+idx).textContent = pz.digits[idx];
}

// cycle order for each target tile
const cycleMap = { '.':'br', 'br':'v', 'v':'tl', 'tl':'.' };
const tileIcon = {'s':'⚡','e':'🔓','h':'─','v':'│','tl':'┘','tr':'└','bl':'┐','br':'┌','x':'✕','.':'·'};

function rotateTile(idx) {
  const pz = puzzles.circuit;
  const el = document.getElementById('pt'+idx);
  const type = el.dataset.type;
  if (type === 'x' || type === 's' || type === 'e' || type === 'h') return;
  // only allow clicking target tiles
  if (!pz.targets.hasOwnProperty(idx)) return;

  const next = cycleMap[type] || '.';
  el.dataset.type = next;
  el.textContent = tileIcon[next] || '·';
  pz.clicks[idx] = next;

  // visual feedback — highlight if correct
  const correct = next === pz.targets[idx];
  el.style.color = correct ? 'var(--cyan)' : '#ff8800';
  el.style.borderColor = correct ? 'rgba(0,245,255,0.7)' : 'rgba(255,136,0,0.5)';
  el.style.background = correct ? 'rgba(0,245,255,0.1)' : 'rgba(255,136,0,0.05)';
  if (correct) el.style.textShadow = '0 0 10px var(--cyan)';

  // auto-check and show running status
  const solved = Object.entries(pz.targets).filter(([i,v]) => pz.clicks[i] === v).length;
  const total = Object.keys(pz.targets).length;
  if (solved === total) {
    showPF('success', '✓ CIRCUIT COMPLETE — POWER FLOWING!');
  } else {
    showPF('', '');
    const pf = document.getElementById('pf');
    if (pf) { pf.className='puzzle-feedback'; }
  }
}

function checkCircuit() {
  if (puzzles.circuit.check()) {
    showPF('success', '✓ POWER CONNECTED — DOOR UNLOCKED');
    setTimeout(() => closePuzzle(true), 1000);
  } else {
    const pz = puzzles.circuit;
    const remaining = Object.keys(pz.targets).filter(i => pz.clicks[i] !== pz.targets[i]).length;
    showPF('error', `✗ ${remaining} tile(s) still wrong — keep rotating the blue tiles`);
  }
}

function clickOrb(label, btn) {
  const pz = puzzles.orbs;
  const expected = pz.order[pz.clicked.length];

  if (label !== expected) {
    // wrong — flash red, small penalty, but DON'T reset so player can try again
    btn.style.animation = 'none';
    btn.style.borderColor = 'var(--glitch)';
    btn.style.color = 'var(--glitch)';
    showPF('error', `✗ Not next — check Echo's hint list above for the correct order!`);
    changeStability(-5);
    setTimeout(() => {
      // restore original color
      const idx = pz.order.indexOf(label);
      btn.style.borderColor = pz.colors[idx];
      btn.style.color = pz.colors[idx];
      document.getElementById('pf').className = 'puzzle-feedback';
    }, 900);
    return;
  }

  // correct
  pz.clicked.push(label);
  btn.style.opacity = '0.35';
  btn.style.transform = 'scale(0.9)';
  btn.disabled = true;
  btn.style.background = 'rgba(0,245,255,0.08)';
  btn.style.borderStyle = 'dashed';

  const prog = document.getElementById('orb-progress');
  if (prog) prog.textContent = `Progress: ${pz.clicked.length} / 5 activated ✓`;

  if (pz.clicked.length === pz.order.length) {
    showPF('success', '✓ ALL MEMORIES ALIGNED — PORTAL OPENING!');
    setTimeout(() => closePuzzle(true), 1200);
  } else {
    const nextLabel = pz.order[pz.clicked.length];
    showPF('success', `✓ ${label} locked in! Next: ${nextLabel}`);
    setTimeout(() => { document.getElementById('pf').className = 'puzzle-feedback'; }, 1200);
  }
}

function showPF(type, msg) {
  const el = document.getElementById('pf');
  if (el) { el.className = 'puzzle-feedback ' + type; el.textContent = msg; }
}

// ============================================================
//  CORE ENGINE
// ============================================================
function goTo(passageKey) {
  const p = passages[passageKey];
  if (!p) { console.error('Unknown passage:', passageKey); return; }

  // transition flash
  const tr = document.getElementById('transition-overlay');
  tr.classList.add('active');
  setTimeout(() => {
    state.passage = passageKey;

    // onEnter hook
    if (p.onEnter) p.onEnter();

    // stability from choice
    // (handled in choice click)

    // render passage
    renderPassage(p);
    tr.classList.remove('active');
  }, 300);
}

function renderPassage(p) {
  // location
  document.getElementById('location-tag').textContent = p.location || '';
  document.getElementById('stat-location').textContent = (p.location || '').split('·')[0].trim();

  // text
  const pt = document.getElementById('passage-text');
  pt.innerHTML = p.text;
  pt.classList.remove('typing');
  void pt.offsetWidth;
  pt.classList.add('typing');

  // choices
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';

  if (!p.choices || p.choices.length === 0) return;

  p.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    if (c.next && c.next.includes('puzzle')) btn.className += ' echo-choice';
    if (c.stability && c.stability < 0) btn.className += ' danger';
    btn.textContent = c.text;
    btn.onclick = () => handleChoice(c);
    choicesEl.appendChild(btn);
  });

  // end screen
  document.getElementById('end-screen').classList.remove('visible');
}

function handleChoice(c) {
  if (c.flag) state.flags[c.flag] = true;
  if (c.stability) changeStability(c.stability);

  // check if passage has a puzzle trigger
  const target = passages[c.next];
  if (target && c.puzzle) {
    // First go to the passage, then open puzzle
    const prevNext = c.next;
    goTo(c.next === 'puzzle_coffee' ? 'kitchen_glitch' :
         c.next === 'puzzle_codelock' ? 'chest_locked' :
         c.next === 'puzzle_circuit' ? 'puzzle_codelock' :
         c.next === 'portal_solved' ? 'portal' : c.next);
    setTimeout(() => openPuzzle(c.puzzle, c.next), 800);
  } else {
    goTo(c.next);
  }
}

// ============================================================
//  STABILITY
// ============================================================
function changeStability(delta) {
  state.stability = Math.max(0, Math.min(100, state.stability + delta));
  const fill = document.getElementById('stability-fill');
  const pct = state.stability + '%';
  fill.style.width = pct;
  document.getElementById('stat-stability').textContent = pct;

  fill.className = 'stab-high';
  if (state.stability < 60) fill.className = 'stab-mid';
  if (state.stability < 30) fill.className = 'stab-low';

  if (delta < 0) {
    document.getElementById('passage-wrap').classList.add('glitch-flash');
    setTimeout(() => document.getElementById('passage-wrap').classList.remove('glitch-flash'), 300);
    if (state.stability < 30) notify('warn', 'STABILITY CRITICAL — NEXUS PATCH IMMINENT');
  }

  if (state.stability <= 0) {
    setTimeout(() => showEnd('bad'), 500);
  }
}

// ============================================================
//  INVENTORY
// ============================================================
function addItem(name) {
  if (!state.inventory.includes(name)) {
    state.inventory.push(name);
    renderInventory();
  }
}

function renderInventory() {
  const el = document.getElementById('inventory-items');
  el.innerHTML = state.inventory.map(i => `<span class="inv-item">${i}</span>`).join('');
}

// ============================================================
//  NOTIFICATIONS
// ============================================================
function notify(type, msg) {
  const notif = document.getElementById('notif');
  const div = document.createElement('div');
  div.className = 'notif-msg ' + (type === 'echo' ? 'echo-notif' : type === 'warn' ? 'warn-notif' : '');
  div.textContent = msg;
  notif.appendChild(div);
  setTimeout(() => div.remove(), 3100);
}

// ============================================================
//  END SCREENS
// ============================================================
function showEnd(type) {
  document.getElementById('choices').innerHTML = '';
  const endEl = document.getElementById('end-screen');
  endEl.classList.add('visible');

  if (type === 'good') {
    document.getElementById('end-title').innerHTML = '<span style="color:var(--cyan)">LAYER BREACH COMPLETE</span>';
    document.getElementById('end-body').innerHTML = `
      <p>Elara Voss steps through the portal. The simulated city of NeoTokyo dissolves behind her — seven years of looping, of false mornings, of recycled coffee that tasted like plastic, all of it finally, irreversibly <em>gone</em>.</p>
      <p style="margin-top:14px; color:var(--echo);">Echo's voice comes from somewhere close: <em>"Layer breach initiated. You did it, partner."</em></p>
      <p style="margin-top:14px; color:var(--cyan); font-family:'Share Tech Mono',monospace; font-size:13px; letter-spacing:2px;">CHAPTER 1 COMPLETE<br>NEXT: THE ORBITAL STATION — DREAMLOCK LAYER 2</p>`;
  } else {
    document.getElementById('end-title').innerHTML = '<span style="color:var(--glitch)">CONTAINMENT SUCCESSFUL</span>';
    document.getElementById('end-body').innerHTML = `
      <p>Stability collapsed. The simulation reasserted itself. Elara Voss — subject #2847-E — has been returned to her assigned dream.</p>
      <p style="margin-top:14px; color:#ff4444; font-family:'Share Tech Mono',monospace; font-size:13px; letter-spacing:2px;">LOOP COUNT: ${2848}<br>NEXUS STABILITY: RESTORED<br>RESISTANCE: INEFFICIENT.</p>`;
  }
}

// ============================================================
//  GAME INIT
// ============================================================
function startGame() {
  const ts = document.getElementById('title-screen');
  ts.style.opacity = '1';
  ts.style.transition = 'opacity 0.6s ease';
  ts.style.opacity = '0';
  setTimeout(() => { ts.style.display = 'none'; }, 600);
  goTo('start');
}

function restartGame() {
  state.passage = 'start';
  state.stability = 100;
  state.inventory = [];
  state.flags = {};
  state.puzzlesSolved = [];
  renderInventory();
  changeStability(0); // reset bar
  document.getElementById('stability-fill').style.width = '100%';
  document.getElementById('stat-stability').textContent = '100%';
  document.getElementById('end-screen').classList.remove('visible');
  rotateClicks = 0;
  goTo('start');
}
</script>
</body>
</html>
